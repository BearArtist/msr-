name: Build MSR Driver

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install NuGet CLI
        run: Invoke-WebRequest -Uri "https://dist.nuget.org/win-x86-commandline/latest/nuget.exe" -OutFile "nuget.exe"
        shell: pwsh

      - name: Restore WDK NuGet package
        run: .\nuget.exe install Microsoft.Windows.WDK.x64 -OutputDirectory packages -NonInteractive -Version 10.0.26100.1
        shell: pwsh

      - name: Restore SDK NuGet package
        run: .\nuget.exe install Microsoft.Windows.SDK.CPP.x64 -OutputDirectory packages -NonInteractive -Version 10.0.26100.1
        shell: pwsh

      - name: Find MSBuild
        id: find-msbuild
        run: |
          $vsWhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $msbuildPath = & $vsWhere -latest -requires Microsoft.Component.MSBuild -find "MSBuild\**\Bin\MSBuild.exe" | Select-Object -First 1
          "msbuild=$msbuildPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        shell: pwsh

      - name: Build Driver
        run: |
          $msbuild = "${{ steps.find-msbuild.outputs.msbuild }}"
          & $msbuild msr_drv.vcxproj /p:Configuration=Release /p:Platform=x64 /t:Build /m /v:normal
          if ($LASTEXITCODE -ne 0) { exit 1 }
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: msr-driver-x64
          path: |
            msr_drv.sys
            msr_drv.inf
            msr_client.py
          if-no-files-found: warn
