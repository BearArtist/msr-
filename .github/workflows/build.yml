name: Build MSR Driver

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download and setup EWDK
        run: |
          Write-Host "=== Downloading Enterprise WDK ==="
          $ewdkUrl = "https://go.microsoft.com/fwlink/?linkid=2286070"
          $ewdkIso = "$env:TEMP\ewdk.iso"
          Invoke-WebRequest -Uri $ewdkUrl -OutFile $ewdkIso -UseBasicParsing
          Write-Host "Download complete."
          $mount = Mount-DiskImage -ImagePath $ewdkIso -PassThru
          $driveLetter = ($mount | Get-Volume).DriveLetter
          Write-Host "Mounted at: ${driveLetter}:"
          $ewdkRoot = "${driveLetter}:\Program Files\Windows Kits\10"
          echo "EWDK_ROOT=$ewdkRoot" >> $env:GITHUB_ENV
          echo "EWDK_DRIVE=${driveLetter}:" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Find build tools
        id: tools
        run: |
          $ewdkDrive = $env:EWDK_DRIVE
          $clPath = Get-ChildItem -Path $ewdkDrive -Recurse -Filter "cl.exe" -ErrorAction SilentlyContinue |
                    Where-Object { $_.FullName -match "x64" } | Select-Object -First 1
          $linkPath = Get-ChildItem -Path $ewdkDrive -Recurse -Filter "link.exe" -ErrorAction SilentlyContinue |
                      Where-Object { $_.FullName -match "x64" } | Select-Object -First 1
          Write-Host "cl: $($clPath.FullName)"
          Write-Host "link: $($linkPath.FullName)"
          echo "cl_path=$($clPath.FullName)" >> $env:GITHUB_OUTPUT
          echo "link_path=$($linkPath.FullName)" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Build Driver
        run: |
          $cl = "${{ steps.tools.outputs.cl_path }}"
          $link = "${{ steps.tools.outputs.link_path }}"
          $ewdkRoot = $env:EWDK_ROOT
          $sdkVersions = Get-ChildItem "$ewdkRoot\Include" -Directory | Sort-Object Name -Descending
          $sdkVer = ($sdkVersions | Select-Object -First 1).Name
          Write-Host "SDK: $sdkVer"

          & $cl /nologo /W3 /GS- /D NTDDI_VERSION=0x0A000000 /D _WIN64 /D _AMD64_ /D _NDEBUG /D _KERNEL_MODE `
            /I"$ewdkRoot\Include\$sdkVer\km" /I"$ewdkRoot\Include\$sdkVer\shared" /I"$ewdkRoot\Include\$sdkVer\ucrt" `
            /kernel /Zi /Od /c /Fo:msr_drv.obj msr_drv.c
          if ($LASTEXITCODE -ne 0) { exit 1 }

          $libPath = "$ewdkRoot\lib\$sdkVer\km\x64"
          & $link /nologo /DEBUG /DRIVER /ENTRY:DriverEntry /OUT:msr_drv.sys /SUBSYSTEM:NATIVE /MACHINE:X64 /LIBPATH:$libPath msr_drv.obj ntoskrnl.lib hal.lib
          if ($LASTEXITCODE -ne 0) { exit 1 }
          Write-Host "Build OK: $((Get-Item msr_drv.sys).Length) bytes"
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: msr-driver-x64
          path: |
            msr_drv.sys
            msr_drv.inf
            msr_client.py
